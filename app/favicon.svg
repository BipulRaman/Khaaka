<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Khaaka">
  <defs>
    <!-- Deep midnight → teal premium gradient -->
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1f2a44"/>
      <stop offset="55%"  stop-color="#0f3a5b"/>
      <stop offset="100%" stop-color="#0a6e6e"/>
    </linearGradient>
    <radialGradient id="kglow" cx="30%" cy="20%" r="80%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe7a8"/>
      <stop offset="55%"  stop-color="#e8b94a"/>
      <stop offset="100%" stop-color="#b88425"/>
    </linearGradient>
    <filter id="ks" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1"/>
      <feOffset dy="1.2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded squircle tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#kg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#kglow)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" ry="13.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.18"/>

  <!-- Stylized "K" monogram in warm gold -->
  <g filter="url(#ks)" fill="none" stroke="url(#kgold)" stroke-width="6"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 14 V50"/>
    <path d="M22 32 L42 14"/>
    <path d="M22 32 L44 50"/>
  </g>

  <!-- Accent dot -->
  <circle cx="48" cy="16" r="3" fill="#e8b94a" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.2"/>
</svg>
