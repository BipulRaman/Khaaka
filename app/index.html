<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khaaka — Layout Studio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="mask-icon" href="favicon.svg" color="#0f3a5b" />
  <meta name="theme-color" content="#0f3a5b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ======================== Inline icon library ======================== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- Pencil tip + body, drawn diagonally -->
        <path d="M14.5 4.5l5 5L9 20l-5.5.5L4 15z" fill="currentColor" fill-opacity="0.18"/>
        <path d="M14.5 4.5l5 5"/>
        <path d="M14.5 4.5L4 15l-.5 5.5L9 20 19.5 9.5z"/>
        <!-- Pencil tip highlight -->
        <path d="M3.5 20.5L9 20" stroke-opacity="0.65"/>
        <!-- Sketch underline stroke being drawn -->
        <path d="M5 22.5c2-1 4-1 6-0.5s4 0.5 6 0" stroke-opacity="0.55" stroke-dasharray="0.5 1.6"/>
      </symbol>

      <!-- Tools -->
      <symbol id="i-cursor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 8-6 1.6-2.4 6L5 3z"/></symbol>
      <symbol id="i-hand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V7a1.5 1.5 0 0 1 3 0v4"/><path d="M10 11V6a1.5 1.5 0 0 1 3 0v5"/><path d="M13 11V7a1.5 1.5 0 0 1 3 0v5"/><path d="M16 12V9a1.5 1.5 0 0 1 3 0v5.5a5.5 5.5 0 0 1-5.5 5.5h-1.2a6 6 0 0 1-4.6-2.1L4.5 14a1.6 1.6 0 0 1 2.3-2.2L9 14"/></symbol>
      <symbol id="i-room"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5.5" width="17" height="13" rx="1.2"/></symbol>
      <symbol id="i-polygon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 6-3.5 11h-11L3 9z"/></symbol>
      <symbol id="i-wall"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M4 19L20 5"/></symbol>
      <symbol id="i-door"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19h14"/><path d="M5 19V8"/><path d="M5 8a14 14 0 0 1 14 11"/></symbol>
      <symbol id="i-window" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="1"/><path d="M12 6v12M4 12h16"/></symbol>
      <symbol id="i-text"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6h14M12 6v13M9 19h6"/></symbol>
      <symbol id="i-ruler"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14.5L14.5 3 21 9.5 9.5 21 3 14.5z"/><path d="M6 13l1.5 1.5M9 10l2 2M12 7l1.5 1.5M15 10l1.5 1.5M12 13l2 2"/></symbol>

      <!-- Editing -->
      <symbol id="i-undo"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h9a7 7 0 1 1 0 14h-3"/></symbol>
      <symbol id="i-redo"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9h-9a7 7 0 1 0 0 14h3"/></symbol>
      <symbol id="i-trash"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/><path d="M10 11v7M14 11v7"/></symbol>

      <!-- View -->
      <symbol id="i-zoom-in"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M11 8v6M8 11h6M20 20l-4.3-4.3"/></symbol>
      <symbol id="i-zoom-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M8 11h6M20 20l-4.3-4.3"/></symbol>
      <symbol id="i-frame"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V5a1 1 0 0 1 1-1h3M4 16v3a1 1 0 0 0 1 1h3M20 8V5a1 1 0 0 0-1-1h-3M20 16v3a1 1 0 0 1-1 1h-3"/></symbol>
      <symbol id="i-gear"     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></symbol>

      <!-- Topbar -->
      <symbol id="i-plus"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21s-6.7-4.35-9.4-8.1C.3 9.8 1.04 5.9 4.5 4.5 6.73 3.6 8.8 4.2 10.2 5.7L12 7.7l1.8-2c1.4-1.5 3.47-2.1 5.7-1.2 3.46 1.4 4.2 5.3 1.9 8.4C18.7 16.65 12 21 12 21z"/></symbol>
      <symbol id="i-github" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.9.57.1.78-.25.78-.56 0-.27-.01-1.16-.02-2.11-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.72-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.05 0 0 .96-.31 3.14 1.17A10.9 10.9 0 0 1 12 6.9c.98 0 1.97.13 2.9.4 2.18-1.48 3.14-1.17 3.14-1.17.62 1.59.23 2.76.11 3.05.74.8 1.18 1.82 1.18 3.07 0 4.41-2.69 5.38-5.25 5.67.41.36.78 1.07.78 2.16 0 1.56-.01 2.81-.01 3.19 0 .31.2.67.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/></symbol>
      <symbol id="i-save"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5a2 2 0 0 1 2-2h10l4 4v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5z"/><path d="M8 3v6h8V3M8 21v-7h8v7"/></symbol>
      <symbol id="i-export"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/><path d="M12 16V4M7 9l5-5 5 5"/></symbol>
      <symbol id="i-import"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/><path d="M12 4v12M7 11l5 5 5-5"/></symbol>
      <symbol id="i-folder-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v1H3z"/><path d="M3 10h18l-2 8a2 2 0 0 1-2 1.5H5a2 2 0 0 1-2-1.5z"/></symbol>
      <symbol id="i-save-as" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5a2 2 0 0 1 2-2h8l4 4v6"/><path d="M8 3v6h7"/><path d="M14 17h7M17.5 13.5L21 17l-3.5 3.5"/></symbol>
      <symbol id="i-image"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M3 17l5-4 5 4 3-2 5 4"/></symbol>
      <symbol id="i-json"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H6a2 2 0 0 0-2 2v3M9 20H6a2 2 0 0 1-2-2v-3M15 4h3a2 2 0 0 1 2 2v3M15 20h3a2 2 0 0 0 2-2v-3"/></symbol>
      <symbol id="i-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></symbol>

      <!-- Layers categories -->
      <symbol id="i-cat-all"     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></symbol>
      <symbol id="i-cat-room"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5.5" width="17" height="13" rx="1.2"/></symbol>
      <symbol id="i-cat-polygon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 6-3.5 11h-11L3 9z"/></symbol>
      <symbol id="i-cat-wall"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 19L20 5"/></symbol>
      <symbol id="i-cat-door"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19h14M5 19V8M5 8a14 14 0 0 1 14 11"/></symbol>
      <symbol id="i-cat-window"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="12" rx="1"/><path d="M12 6v12M4 12h16"/></symbol>
      <symbol id="i-cat-text"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6h14M12 6v13M9 19h6"/></symbol>
      <symbol id="i-cat-measure" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M5 9v6M19 9v6"/></symbol>

      <!-- Layer row -->
      <symbol id="i-grip"   viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></symbol>
      <symbol id="i-lock"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></symbol>
      <symbol id="i-unlock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 7.5-2"/></symbol>
      <symbol id="i-x"      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></symbol>
    </defs>
  </svg>

  <!-- ============================== TOPBAR ============================== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo"><svg class="ic"><use href="#i-logo"/></svg></span>
      <span class="brand-name">Khaaka</span>
      <small class="brand-tag">Layout Studio</small>
    </div>
    <div class="project-name" title="Project name (used as the file name when saving)">
      <div class="title-row">
        <input id="project-name" type="text" maxlength="80" placeholder="Untitled Layout" autocomplete="off" spellcheck="false" />
        <span class="ext-suffix" id="ext-suffix" aria-hidden="true">.json</span>
      </div>
      <span class="file-name" id="file-name" aria-live="polite" title="Current file">Unsaved</span>
    </div>
    <div class="topbar-actions">
      <label class="units-select" title="Display units">
        <span class="sr-only">Units</span>
        <select id="opt-units" aria-label="Display units">
          <option value="ft" selected>ft / in</option>
          <option value="m">m / cm</option>
        </select>
      </label>
      <span class="sep"></span>
      <div class="dropdown" id="file-dropdown">
        <button class="ghost dropdown-trigger" id="btn-file" type="button" title="Open / Save to a file on your computer" aria-haspopup="true" aria-expanded="false">
          <svg class="ic"><use href="#i-folder-open"/></svg><span>File</span>
          <svg class="ic ic-chevron"><use href="#i-chevron"/></svg>
        </button>
        <div class="dropdown-panel dropdown-menu" id="file-panel" hidden role="menu" aria-label="File">
          <button type="button" class="dropdown-item" id="btn-open-file" role="menuitem">
            <svg class="ic"><use href="#i-import"/></svg>
            <span class="dd-label">Open File…</span>
            <span class="kbd-hint">Ctrl+O</span>
          </button>
          <button type="button" class="dropdown-item" id="btn-save-file" role="menuitem">
            <svg class="ic"><use href="#i-save"/></svg>
            <span class="dd-label">Save File</span>
            <span class="kbd-hint">Ctrl+S</span>
          </button>
          <button type="button" class="dropdown-item" id="btn-save-as-file" role="menuitem">
            <svg class="ic"><use href="#i-save-as"/></svg>
            <span class="dd-label">Save File As…</span>
            <span class="kbd-hint">Ctrl+Shift+S</span>
          </button>
          <div class="dropdown-divider" role="separator"></div>
          <button type="button" class="dropdown-item" id="btn-export-png" role="menuitem">
            <svg class="ic"><use href="#i-image"/></svg>
            <span class="dd-label">Export as Image…</span>
          </button>
        </div>
      </div>
      <span class="sep"></span>
      <input type="file" id="file-open-fallback" accept=".json,application/json" hidden />
      <button class="primary" id="btn-save" type="button" title="Save to file (Ctrl+S)">
        <svg class="ic"><use href="#i-save"/></svg><span>Save</span>
      </button>
      <span class="sep"></span>
      <div class="dropdown" id="settings-dropdown">
        <button class="ghost" id="btn-settings" type="button" title="Scale & canvas settings" aria-haspopup="true" aria-expanded="false">
          <svg class="ic"><use href="#i-gear"/></svg><span>Scale</span>
        </button>
        <div class="dropdown-panel" id="settings-panel" hidden role="dialog" aria-label="Scale & canvas settings">
          <div class="dropdown-section">Display</div>
          <div class="toggle-stack">
            <label class="row"><input type="checkbox" id="opt-grid" checked /><span>Show grid</span></label>
            <label class="row"><input type="checkbox" id="opt-snap" checked /><span>Snap to grid</span></label>
            <label class="row"><input type="checkbox" id="opt-dims" checked /><span>Show dimensions</span></label>
          </div>
          <div class="dropdown-section">Scale</div>
          <div class="grid2">
            <label><span id="opt-grid-size-label">Box size</span>
              <select id="opt-grid-size"></select>
            </label>
            <label>Render scale
              <select id="opt-box-px">
                <option value="25" selected>25 px</option>
                <option value="50">50 px</option>
                <option value="75">75 px</option>
                <option value="100">100 px</option>
                <option value="150">150 px</option>
              </select>
            </label>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ============================== TAB STRIP ============================== -->
  <nav class="tab-strip" id="tab-strip" role="tablist" aria-label="Open files">
    <div class="tab-list" id="tab-list"><!-- tabs injected by app.js --></div>
    <button class="tab-add" id="tab-add" type="button" title="New tab (Ctrl+T)" aria-label="New tab">
      <svg class="ic"><use href="#i-plus"/></svg>
    </button>
  </nav>

  <main class="workspace">
    <!-- ============================== TOOLBAR ============================== -->
    <aside class="toolbar" aria-label="Tools">
      <div class="tool-group">
        <button class="tool active" data-tool="select" title="Hand / Pan (H)">
          <svg class="ic"><use href="#i-hand"/></svg>
        </button>
        <button class="tool" data-tool="marquee" title="Mouse Free Select (V)">
          <svg class="ic"><use href="#i-cursor"/></svg>
        </button>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <button class="tool" data-tool="room"   title="Room (R)"><svg class="ic"><use href="#i-room"/></svg></button>
        <button class="tool" data-tool="polygon" title="Polygon (P) — click to drop vertices, double-click or Enter to finish"><svg class="ic"><use href="#i-polygon"/></svg></button>
        <button class="tool" data-tool="wall"   title="Wall (W)"><svg class="ic"><use href="#i-wall"/></svg></button>
        <button class="tool" data-tool="door"   title="Door (D)"><svg class="ic"><use href="#i-door"/></svg></button>
        <button class="tool" data-tool="window" title="Window (N)"><svg class="ic"><use href="#i-window"/></svg></button>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <button class="tool" data-tool="text"    title="Text (T)"><svg class="ic"><use href="#i-text"/></svg></button>
        <button class="tool" data-tool="measure" title="Measure (M)"><svg class="ic"><use href="#i-ruler"/></svg></button>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <button id="btn-undo"      title="Undo (Ctrl+Z)"><svg class="ic"><use href="#i-undo"/></svg></button>
        <button id="btn-redo"      title="Redo (Ctrl+Y)"><svg class="ic"><use href="#i-redo"/></svg></button>
        <button id="btn-delete"    title="Delete (Del)" class="danger"><svg class="ic"><use href="#i-trash"/></svg></button>
      </div>
      <div class="tool-spacer"></div>
    </aside>

    <!-- ============================== CANVAS ============================== -->
    <section class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="hint" id="hint" hidden>Pick a tool and start drawing. Hand tool pans by default, and Ctrl + click-drag selects. Mouse tool does free select. Wheel to zoom, middle-drag to pan. Right-click switches to Hand / Pan.</div>
      <div class="toast" id="toast" hidden></div>
    </section>

    <!-- ========================= PROPERTIES PANEL ========================= -->
    <aside class="properties" id="properties">
      <div class="properties-scroll">

        <section class="card collapsible layers-section" id="layers-card" data-card="layers">
          <button class="card-head" type="button" aria-expanded="true">
            <span class="card-title">Layers</span>
            <span class="card-toggle" aria-hidden="true"></span>
          </button>
          <div class="card-body layers-body">
            <div id="layer-tabs" class="layer-tabs" role="tablist"></div>
            <ul id="layer-list" class="layer-list"></ul>
          </div>
        </section>

      </div>
    </aside>
  </main>

  <footer class="footbar" aria-label="Footer status">
    <div class="footbar-left" aria-label="Credits">
      <span>Made with</span>
      <svg class="ic-heart" aria-hidden="true"><use href="#i-heart"/></svg>
      <span>in</span>
      <span class="country-wrap">
        <span>India</span>
        <svg class="flag-in" viewBox="0 0 18 12" aria-label="India flag" role="img">
          <rect x="0" y="0" width="18" height="4" fill="#ff9933"></rect>
          <rect x="0" y="4" width="18" height="4" fill="#ffffff"></rect>
          <rect x="0" y="8" width="18" height="4" fill="#128807"></rect>
          <circle cx="9" cy="6" r="1.3" fill="none" stroke="#1a3c8f" stroke-width="0.45"></circle>
          <circle cx="9" cy="6" r="0.16" fill="#1a3c8f"></circle>
          <g stroke="#1a3c8f" stroke-width="0.22" stroke-linecap="round">
